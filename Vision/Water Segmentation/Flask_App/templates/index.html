<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Water Segmentation using Pre-trained U-Net Model">
    <title>Water Seg AI Dashboard</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="background-mesh"></div>
    <div class="container">
        <header>
            <h1>Water Segmentation AI</h1>
            <p>Upload multi-spectral .tif satellite imagery to detect water bodies.</p>
        </header>

        <main class="glass-panel">
            <section class="upload-section">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-drop-area" id="dropArea">
                        <span class="file-icon">📥</span>
                        <p class="file-text">Drag & drop your .tif file here or click to browse</p>
                        <input type="file" name="file" id="fileInput" accept=".tif,.tiff" required>
                    </div>
                    <button type="submit" class="primary-btn" id="submitBtn">Run Segmentation 🚀</button>
                </form>

                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p>Processing image with U-Net...</p>
                </div>

                <div id="errorMessage" class="error-msg hidden"></div>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <h2>Segmentation Results</h2>
                <div class="image-comparison">
                    <div class="result-card">
                        <h3>RGB Image</h3>
                        <div class="image-wrapper">
                            <img id="rgbImage" src="" alt="RGB Image">
                        </div>
                    </div>
                    <div class="result-card" id="gtCard" style="display: none;">
                        <h3>Ground Truth Mask</h3>
                        <div class="image-wrapper">
                            <img id="gtImage" src="" alt="Ground Truth Mask">
                        </div>
                    </div>
                    <div class="result-card">
                        <h3>Predicted Water Mask</h3>
                        <div class="image-wrapper">
                            <img id="predImage" src="" alt="Predicted Water Segmentation Mask">
                        </div>
                    </div>
                </div>
                <button id="resetBtn" class="secondary-btn">Process Another Image</button>
            </section>
        </main>

        <footer>
            <p>Powered by PyTorch & Flask</p>
        </footer>
    </div>

    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const resultsSection = document.getElementById('resultsSection');
        const resultImage = document.getElementById('resultImage');
        const resetBtn = document.getElementById('resetBtn');

        // Handle drag and drop visuals
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropArea.classList.add('highlight');
        }

        function unhighlight(e) {
            dropArea.classList.remove('highlight');
        }

        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;

            if (files.length > 0) {
                fileInput.files = files;
                updateFileName(files[0].name);
            }
        }

        fileInput.addEventListener('change', function () {
            if (this.files.length > 0) {
                updateFileName(this.files[0].name);
            }
        });

        function updateFileName(name) {
            document.querySelector('.file-text').innerText = `Selected: ${name}`;
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (fileInput.files.length === 0) {
                showError("Please select a file first.");
                return;
            }

            const formData = new FormData(uploadForm);

            // UI state updates
            submitBtn.classList.add('hidden');
            loading.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            resultsSection.classList.add('hidden');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                document.getElementById('rgbImage').src = data.rgb_image;
                document.getElementById('predImage').src = data.pred_mask;

                if (data.gt_mask) {
                    document.getElementById('gtImage').src = data.gt_mask;
                    document.getElementById('gtCard').style.display = 'flex';
                } else {
                    document.getElementById('gtCard').style.display = 'none';
                }

                loading.classList.add('hidden');
                resultsSection.classList.remove('hidden');

            } catch (error) {
                console.error('Error during prediction:', error);
                showError(error.message);
                submitBtn.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        });

        resetBtn.addEventListener('click', () => {
            uploadForm.reset();
            document.querySelector('.file-text').innerText = "Drag & drop your .tif file here or click to browse";
            resultsSection.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            document.getElementById('rgbImage').src = "";
            document.getElementById('predImage').src = "";
            document.getElementById('gtImage').src = "";
        });

        function showError(msg) {
            errorMessage.innerText = msg;
            errorMessage.classList.remove('hidden');
        }
    </script>
</body>

</html>
